<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Yahoo Finance Test</title>
<style>
body{font-family:monospace;background:#111;color:#0f0;padding:20px;white-space:pre-wrap}
.err{color:#f55}.ok{color:#5f5}
</style>
</head>
<body>
<div id="out">Loading QQQ test...</div>
<script>
async function test(){
  const out = document.getElementById('out');
  out.textContent = 'Fetching QQQ from Yahoo Finance...\n';
  try {
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/QQQ?range=5y&interval=1wk&includePrePost=false';
    const r = await fetch(url, {headers:{'User-Agent':'Mozilla/5.0'}});
    out.textContent += 'HTTP status: ' + r.status + '\n';
    if(!r.ok){ out.textContent += 'FAILED - not ok\n'; return; }
    const d = await r.json();
    const res = d?.chart?.result?.[0];
    if(!res){ out.textContent += 'FAILED - no result in response\n' + JSON.stringify(d).slice(0,500); return; }

    const meta = res.meta || {};
    const ts = res.timestamp || [];
    const quoteClose = res.indicators?.quote?.[0]?.close || [];
    const adjClose = res.indicators?.adjclose?.[0]?.adjclose || [];

    out.textContent += '\n--- META ---\n';
    out.textContent += 'price: ' + meta.regularMarketPrice + '\n';
    out.textContent += 'prevClose: ' + meta.previousClose + '\n';
    out.textContent += 'changePct: ' + meta.regularMarketChangePercent + '\n';
    out.textContent += 'totalAssets: ' + meta.totalAssets + '\n';

    out.textContent += '\n--- HISTORY ---\n';
    out.textContent += 'timestamps count: ' + ts.length + '\n';
    out.textContent += 'quote.close count: ' + quoteClose.length + '\n';
    out.textContent += 'adjclose count: ' + adjClose.length + '\n';
    out.textContent += 'first 3 quote.close: ' + JSON.stringify(quoteClose.slice(0,3)) + '\n';
    out.textContent += 'last 3 quote.close: ' + JSON.stringify(quoteClose.slice(-3)) + '\n';

    const validPairs = ts.map((t,i)=>[t, quoteClose[i]]).filter(p=>p[1]!=null);
    out.textContent += '\nvalid (timestamp, close) pairs: ' + validPairs.length + '\n';

    if(validPairs.length > 5){
      const cur = validPairs[validPairs.length-1][1];
      const nowMs = Date.now();
      function idxAt(targetMs){
        let best=0, bd=Infinity;
        validPairs.forEach((p,i)=>{ const diff=Math.abs(p[0]*1000-targetMs); if(diff<bd){bd=diff;best=i;} });
        return best;
      }
      const i1m = idxAt(nowMs - 30*86400000);
      const i1y = idxAt(nowMs - 365*86400000);
      const m1pct = ((cur - validPairs[i1m][1]) / validPairs[i1m][1] * 100).toFixed(2);
      const y1pct = ((cur - validPairs[i1y][1]) / validPairs[i1y][1] * 100).toFixed(2);

      out.textContent += '\n--- COMPUTED ---\n';
      out.textContent += 'current price: ' + cur + '\n';
      out.textContent += '1M return: ' + m1pct + '%\n';
      out.textContent += '1Y return: ' + y1pct + '%\n';
      out.innerHTML += '\n<span class="ok">✅ SUCCESS - data pipeline works!</span>';
    } else {
      out.innerHTML += '\n<span class="err">❌ FAILED - not enough valid price points</span>';
    }
  } catch(e) {
    out.innerHTML += '\n<span class="err">EXCEPTION: ' + e.message + '</span>';
  }
}
test();
</script>
</body>
</html>
